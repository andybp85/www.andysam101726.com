<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="author" content="Andy & Sam">
    <meta name="description" content="Andy & Sam's digital wedding invitation site">
    <meta name="theme-color" content="#2a1a14">
    <meta name="robots" content="nofollow, noindex">
    <title>Andy & Sam's Wedding</title>
    <link rel="stylesheet" href="/home/styles.css">
    <link rel="icon" type="image/svg+xml" href="/images/favicon.svg">
    <link rel="icon" type="image/png" href="/images/favicon-96x96.png" sizes="96x96">
    <link rel="shortcut icon" href="/images/favicon.ico">
    <link rel="apple-touch-icon" sizes="180x180" href="/images/apple-touch-icon.png">
    <meta name="apple-mobile-web-app-title" content="Andy & Sam">
    <link rel="manifest" href="/site.webmanifest">
    <script>if (!localStorage.getItem('token')) location.replace('/')</script>
</head>
<body>
<h1>Andy &amp; Sam's<br class="title-break"> Wedding</h1>
<nav id="site-nav" aria-label="Site navigation"></nav>
<main>
    <section class="hero">
        <picture>
          <source media="(max-width: 700px)" type="image/avif" srcset="/images/home-mobile.avif">
          <source media="(max-width: 700px)" type="image/webp" srcset="/images/home-mobile.webp">
          <source type="image/avif" srcset="/images/home-desktop.avif">
          <source type="image/webp" srcset="/images/home-desktop.webp">
          <img src="/images/home-desktop.webp" alt="Andy and Sam" width="1600" height="1067" fetchpriority="high">
        </picture>
        <div class="hero-overlay">
            <p class="names">Andy Stanish &amp; Sam Harber</p>
            <p class="date">October 17, 2026</p>
            <p class="place">Morristown, NJ</p>
            <a class="rsvp-btn" href="/rsvp/">RSVP</a>
        </div>
    </section>
    <section class="details">
        <p class="names">Andy Stanish &amp; Sam Harber</p>
        <p class="date">October 17, 2026</p>
        <p class="place">The Madison Hotel<br>Morristown, NJ</p>
        <a class="rsvp-btn big" href="/rsvp/">RSVP</a>
    </section>
</main>
<script src="/site.js"></script>
<script type="module" src="/radio-nav.js"></script>
</body>
</html>
